services:
  - type: web
    name: hotwheels-baku
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: hotwheels-baku-db
          property: connectionString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: hotwheels-baku-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://hotwheels-i8pm.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://hotwheels-i8pm.onrender.com
      - key: TELEGRAM_WEBHOOK_URL
        value: https://hotwheels-i8pm.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: NEXT_PUBLIC_TELEGRAM_PUBLIC_BOT_URL
        sync: false
      - key: TELEGRAM_PUBLIC_BOT_USERNAME
        sync: false
      - key: TELEGRAM_PUBLIC_BOT_TOKEN
        sync: false
      - key: TELEGRAM_PUBLIC_WEBHOOK_SECRET
        generateValue: true
      - key: TELEGRAM_MOD_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MOD_ALLOWED_USER_ID
        sync: false
      - key: TELEGRAM_MOD_CHAT_ID
        sync: false
      - key: TELEGRAM_MOD_WEBHOOK_SECRET
        generateValue: true
      - key: CRYPTOBOT_API_TOKEN
        sync: false
      - key: CRYPTOBOT_COMMISSION_AMOUNT_USD
        value: 0.59
      - key: LISTING_CONTACT_COMMISSION_AZN
        value: 1
      - key: PLATFORM_OWNER_TELEGRAM_USERNAME
        sync: false
      - key: STORAGE_MODE
        value: local
      - key: UPLOAD_BASE_URL
        value: https://hotwheels-i8pm.onrender.com
      - key: ALLOWED_CITY
        value: Baku
      - key: ALLOW_WEB_ROLE_MANAGEMENT
        value: false
databases:
  - name: hotwheels-baku-db
    plan: free
